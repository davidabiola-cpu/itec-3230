<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShawarmaGo | Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-shell sticky-top">
    <div class="container py-3">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <a class="navbar-brand m-0 brand-mark" href="index.html">SHAWARMA<span>GO</span></a>
        <nav class="d-flex flex-wrap align-items-center justify-content-end gap-2 nav-links">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="menu.html">Menu</a>
          <a class="nav-link" href="offers.html">Offers</a>
          <a class="nav-link" href="track-order.html">Track Order</a>
          <a class="nav-link active" href="profile.html">Profile</a>
          <a class="btn btn-brand btn-sm px-4" href="order-now.html">Order Now</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="py-5">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="surface-card p-4 p-lg-5 h-100">
            <span class="section-eyebrow">Account</span>
            <h1 class="section-title">Login</h1>
            <p class="text-muted-soft">Add your details to access saved orders and delivery info.</p>

            <form class="row g-3 mt-1">
              <div class="col-12">
                <input class="form-control" type="text" placeholder="User name" />
              </div>
              <div class="col-12">
                <input class="form-control" type="password" placeholder="Password" />
              </div>
              <div class="col-12">
                <button class="btn btn-brand w-100" type="button">Login</button>
              </div>
            </form>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="surface-card p-4 p-lg-5 h-100">
            <span class="section-eyebrow">Create account</span>
            <h2 class="section-title">Manage your profile</h2>

            <form class="row g-3 mt-1">
              <div class="col-md-6">
                <input class="form-control" type="text" placeholder="Full name" />
              </div>
              <div class="col-md-6">
                <input class="form-control" type="email" placeholder="Email address" />
              </div>
              <div class="col-md-6">
                <input class="form-control" type="tel" placeholder="Phone number" />
              </div>
              <div class="col-md-6">
                <input class="form-control" type="text" placeholder="City / State" />
              </div>
              <div class="col-12">
                <input class="form-control" type="text" placeholder="Delivery address" />
              </div>
              <div class="col-md-6">
                <input class="form-control" type="password" placeholder="Password" />
              </div>
              <div class="col-md-6">
                <input class="form-control" type="password" placeholder="Confirm password" />
              </div>
              <div class="col-12">
                <button class="btn btn-brand w-100" type="button">Save Profile</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
