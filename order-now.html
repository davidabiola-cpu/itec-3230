<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShawarmaGo | Order Now</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-shell sticky-top">
    <div class="container py-3">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <a class="navbar-brand m-0 brand-mark" href="index.html">SHAWARMA<span>GO</span></a>
        <nav class="d-flex flex-wrap align-items-center justify-content-end gap-2 nav-links">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="menu.html">Menu</a>
          <a class="nav-link" href="offers.html">Offers</a>
          <a class="nav-link" href="track-order.html">Track Order</a>
          <a class="nav-link" href="profile.html">Profile</a>
          <a class="btn btn-brand btn-sm px-4" href="order-now.html">Order Now</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="py-5">
    <div class="container">
      <div class="row g-4 align-items-start">
        <div class="col-lg-7">
          <div class="surface-card p-4 p-lg-5 h-100">
            <span class="section-eyebrow">Checkout</span>
            <h1 class="section-title">Complete your order</h1>

            <form class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label">Full name</label>
                <input class="form-control" type="text" placeholder="John Doe" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone number</label>
                <input class="form-control" type="tel" placeholder="+1 987 654 3210" />
              </div>
              <div class="col-12">
                <label class="form-label">Delivery address</label>
                <input class="form-control" type="text" placeholder="House, Street, City, State" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Coupon</label>
                <input class="form-control" type="text" value="OFF50" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Payment method</label>
                <select class="form-select">
                  <option>Cash on delivery</option>
                  <option>Visa ending in 1369</option>
                  <option>UPI / Wallet</option>
                </select>
              </div>
            </form>
          </div>
        </div>

        <div class="col-lg-5">
          <aside class="surface-card p-4 p-lg-5">
            <span class="section-eyebrow">Order summary</span>
            <h2 class="section-title h3">Chicken Shawarma Combo</h2>

            <div class="summary-line"><span>Subtotal</span><strong>$15.00</strong></div>
            <div class="summary-line"><span>Delivery</span><strong>$3.99</strong></div>
            <div class="summary-line"><span>Discount</span><strong>- $5.00</strong></div>
            <div class="summary-line total-line"><span>Total</span><strong>$13.99</strong></div>

            <a class="btn btn-brand w-100 mt-3" href="track-order.html">Send Order</a>
          </aside>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
