<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShawarmaGo | Track Order</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-shell sticky-top">
    <div class="container py-3">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <a class="navbar-brand m-0 brand-mark" href="index.html">SHAWARMA<span>GO</span></a>
        <nav class="d-flex flex-wrap align-items-center justify-content-end gap-2 nav-links">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="menu.html">Menu</a>
          <a class="nav-link" href="offers.html">Offers</a>
          <a class="nav-link active" href="track-order.html">Track Order</a>
          <a class="nav-link" href="profile.html">Profile</a>
          <a class="btn btn-brand btn-sm px-4" href="order-now.html">Order Now</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="py-5">
    <div class="container">
      <div class="row g-4 align-items-stretch">
        <div class="col-lg-7">
          <div class="map-visual surface-card h-100">
            <div class="map-bubble">
              <strong>Current delivery route</strong>
              <span>Driver is on the way with your order.</span>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="surface-card p-4 p-lg-5 h-100 d-flex flex-column justify-content-center">
            <span class="section-eyebrow">Track your order</span>
            <h1 class="section-title">ETA: 20 min</h1>

            <div class="driver-pill my-3">
              <div class="avatar-circle"></div>
              <div>
                <strong class="d-block">Delivery Agent</strong>
                <span class="text-muted-soft">Order picked up from restaurant</span>
              </div>
            </div>

            <div class="summary-line"><span>Order</span><strong>Chicken Shawarma Combo</strong></div>
            <div class="summary-line"><span>Status</span><strong>Out for delivery</strong></div>
            <div class="summary-line total-line"><span>Total</span><strong>$13.99</strong></div>

            <div class="d-flex flex-wrap gap-2 mt-3">
              <a class="btn btn-brand" href="order-now.html">Change Address</a>
              <a class="btn btn-outline-soft" href="index.html">Back Home</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
